name: AlaskaRouter
options:
  bundleIdPrefix: dev.alaskarouter
  developmentLanguage: en
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  MapLibreSwiftUI:
    url: https://github.com/maplibre/swiftui-dsl
    branch: main
targets:
  AlaskaRouter:
    type: application
    platform: iOS
    sources:
      - path: AlaskaRouter/App
      - path: AlaskaRouter/Data
      - path: AlaskaRouter/Map
      - path: AlaskaRouter/Routing
      - path: AlaskaRouter/Search
      - path: AlaskaRouter/UI
      - path: AlaskaRouter/Resources
      - path: AlaskaRouter/Assets.xcassets
      - path: AlaskaRouter/glyphs
        type: folder
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: dev.alaskarouter.AlaskaRouter
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "AlaskaRouter shows your position on the map so you can see how close you are to your trip stops. Used only while the app is open."
        DEVELOPMENT_TEAM: 8UGV7J3SKQ
    dependencies:
      - package: MapLibreSwiftUI
        product: MapLibreSwiftUI
      - package: MapLibreSwiftUI
        product: MapLibreSwiftDSL
  AlaskaRouterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        PRODUCT_BUNDLE_IDENTIFIER: dev.alaskarouter.AlaskaRouterTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AlaskaRouter.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AlaskaRouter"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: AlaskaRouter
